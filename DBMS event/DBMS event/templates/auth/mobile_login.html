<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mobile Login - Nexus Event</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            background-size: 200% 200%;
            animation: gradientShift 15s ease infinite;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            position: relative;
            overflow-x: hidden;
            overflow-y: auto;
            padding: 20px;
        }
        
        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        
        body::before {
            content: '';
            position: fixed;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 1px, transparent 1px);
            background-size: 50px 50px;
            animation: particleMove 20s linear infinite;
            pointer-events: none;
            z-index: 0;
        }
        
        @keyframes particleMove {
            0% { transform: translate(0, 0); }
            100% { transform: translate(50px, 50px); }
        }
        .login-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 25px;
            box-shadow: 0 25px 70px rgba(0, 0, 0, 0.3), 0 0 0 1px rgba(255, 255, 255, 0.3);
            padding: 50px;
            max-width: 900px;
            width: 95%;
            animation: slideUp 0.7s ease-out, floating 3s ease-in-out infinite;
            position: relative;
            z-index: 1;
        }
        
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        @keyframes floating {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }
        
        @media (max-width: 768px) {
            .login-card {
                max-width: 500px;
                padding: 30px;
            }
        }
        .logo {
            text-align: center;
            margin-bottom: 30px;
        }
        .logo h1 {
            color: #667eea;
            font-size: 38px;
            font-weight: 800;
            margin: 0;
            text-shadow: 2px 2px 10px rgba(102, 126, 234, 0.3);
            letter-spacing: -0.5px;
        }
        .logo p {
            color: #666;
            font-size: 14px;
            margin-top: 5px;
        }
        .form-control {
            border-radius: 12px;
            padding: 14px 15px;
            border: 2px solid #e0e0e0;
            font-size: 15px;
            transition: all 0.4s ease;
            background: rgba(255, 255, 255, 0.9);
        }
        
        .form-control:hover {
            border-color: #c7d2fe;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.15);
        }
        .form-control:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.15), 0 8px 20px rgba(102, 126, 234, 0.2);
            transform: translateY(-2px);
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 12px;
            padding: 15px;
            font-size: 17px;
            font-weight: 700;
            width: 100%;
            margin-top: 20px;
            transition: all 0.4s ease;
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
            position: relative;
            overflow: hidden;
            letter-spacing: 0.5px;
        }
        
        .btn-primary::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: left 0.5s;
        }
        
        .btn-primary:hover::before {
            left: 100%;
        }
        
        .btn-primary:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.6);
        }
        #otp-section {
            margin-top: 20px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 10px;
        }
        .otp-input {
            text-align: center;
            font-size: 24px;
            letter-spacing: 10px;
            font-weight: bold;
        }
        .links {
            text-align: center;
            margin-top: 20px;
        }
        .links a {
            color: #667eea;
            text-decoration: none;
            font-weight: 500;
        }
        .links a:hover {
            text-decoration: underline;
        }
        .success-message {
            color: #10b981;
            font-weight: 600;
        }
        .error-message {
            color: #ef4444;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="logo">
            <h1><i class="bi bi-phone-vibrate"></i> Nexus Event</h1>
            <p>Login with Mobile OTP</p>
        </div>

        <!-- Phone Number Section -->
        <div id="phone-section">
            <form id="phone-form">
                <div class="mb-3">
                    <label for="phone" class="form-label"><i class="bi bi-phone"></i> Mobile Number</label>
                    <input type="text" class="form-control" id="phone" name="phone" 
                           placeholder="Enter 10-digit mobile number" 
                           maxlength="10" pattern="[0-9]{10}" required>
                    <small class="text-muted">Enter your registered mobile number</small>
                </div>
                <button type="submit" class="btn btn-primary" id="send-otp-btn">
                    <i class="bi bi-send"></i> Send OTP
                </button>
            </form>
        </div>

        <!-- OTP Verification Section (Hidden Initially) -->
        <div id="otp-section" style="display: none;">
            <div class="text-center mb-3">
                <i class="bi bi-lock-fill" style="font-size: 40px; color: #667eea;"></i>
                <h5 class="mt-2">Enter OTP</h5>
                <p class="text-muted">We've sent a 6-digit OTP to <span id="phone-display" class="fw-bold"></span></p>
            </div>
            <form id="otp-form">
                <div class="mb-3">
                    <input type="text" class="form-control otp-input" id="otp" name="otp" 
                           placeholder="000000" maxlength="6" pattern="[0-9]{6}" required>
                </div>
                <button type="submit" class="btn btn-primary" id="verify-otp-btn">
                    <i class="bi bi-check-circle"></i> Verify & Login
                </button>
                <button type="button" class="btn btn-outline-secondary w-100 mt-2" id="resend-otp-btn">
                    <i class="bi bi-arrow-clockwise"></i> Resend OTP
                </button>
            </form>
        </div>

        <!-- Message Display -->
        <div id="message" class="mt-3 text-center"></div>

        <!-- Links -->
        <div class="links">
            <p>Don't have an account? <a href="/mobile-register">Sign up with mobile</a></p>
            <p><a href="/login"><i class="bi bi-arrow-left"></i> Back to Email Login</a></p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const phoneSection = document.getElementById('phone-section');
        const otpSection = document.getElementById('otp-section');
        const phoneForm = document.getElementById('phone-form');
        const otpForm = document.getElementById('otp-form');
        const sendOtpBtn = document.getElementById('send-otp-btn');
        const verifyOtpBtn = document.getElementById('verify-otp-btn');
        const resendOtpBtn = document.getElementById('resend-otp-btn');
        const messageDiv = document.getElementById('message');
        const phoneDisplay = document.getElementById('phone-display');
        const phoneInput = document.getElementById('phone');
        const otpInput = document.getElementById('otp');

        // Send OTP
        phoneForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const phone = phoneInput.value.trim();

            if (phone.length !== 10 || !/^\d+$/.test(phone)) {
                showMessage('Please enter a valid 10-digit mobile number', 'error');
                return;
            }

            sendOtpBtn.disabled = true;
            sendOtpBtn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> Sending OTP...';

            try {
                const response = await fetch('/mobile-login', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/x-www-form-urlencoded'},
                    body: `phone=${phone}`
                });

                const data = await response.json();

                if (data.success) {
                    showMessage(data.message, 'success');
                    phoneDisplay.textContent = phone;
                    phoneSection.style.display = 'none';
                    otpSection.style.display = 'block';
                    otpInput.focus();
                } else {
                    showMessage(data.message, 'error');
                    sendOtpBtn.disabled = false;
                    sendOtpBtn.innerHTML = '<i class="bi bi-send"></i> Send OTP';
                }
            } catch (error) {
                showMessage('Error sending OTP. Please try again.', 'error');
                sendOtpBtn.disabled = false;
                sendOtpBtn.innerHTML = '<i class="bi bi-send"></i> Send OTP';
            }
        });

        // Verify OTP
        otpForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const otp = otpInput.value.trim();

            if (otp.length !== 6 || !/^\d+$/.test(otp)) {
                showMessage('Please enter a valid 6-digit OTP', 'error');
                return;
            }

            verifyOtpBtn.disabled = true;
            verifyOtpBtn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> Verifying...';

            try {
                const response = await fetch('/mobile-login/verify-otp', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({otp: otp})
                });

                const data = await response.json();

                if (data.success) {
                    showMessage(data.message, 'success');
                    setTimeout(() => {
                        window.location.href = data.redirect;
                    }, 1000);
                } else {
                    showMessage(data.message, 'error');
                    verifyOtpBtn.disabled = false;
                    verifyOtpBtn.innerHTML = '<i class="bi bi-check-circle"></i> Verify & Login';
                }
            } catch (error) {
                showMessage('Error verifying OTP. Please try again.', 'error');
                verifyOtpBtn.disabled = false;
                verifyOtpBtn.innerHTML = '<i class="bi bi-check-circle"></i> Verify & Login';
            }
        });

        // Resend OTP
        resendOtpBtn.addEventListener('click', () => {
            otpSection.style.display = 'none';
            phoneSection.style.display = 'block';
            otpInput.value = '';
            messageDiv.innerHTML = '';
            sendOtpBtn.disabled = false;
            sendOtpBtn.innerHTML = '<i class="bi bi-send"></i> Send OTP';
        });

        // Show message
        function showMessage(text, type) {
            messageDiv.innerHTML = `<div class="${type === 'success' ? 'success-message' : 'error-message'}">
                ${type === 'success' ? '<i class="bi bi-check-circle-fill"></i>' : '<i class="bi bi-exclamation-circle-fill"></i>'}
                ${text}
            </div>`;
        }

        // Auto-focus and formatting for OTP input
        otpInput.addEventListener('input', (e) => {
            e.target.value = e.target.value.replace(/\D/g, '');
        });

        phoneInput.addEventListener('input', (e) => {
            e.target.value = e.target.value.replace(/\D/g, '');
        });
    </script>
</body>
</html>
