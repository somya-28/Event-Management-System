<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quick Registration - Nexus Event</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            background-size: 200% 200%;
            animation: gradientShift 15s ease infinite;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
            overflow-y: auto;
        }
        
        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        
        body::before {
            content: '';
            position: fixed;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 1px, transparent 1px);
            background-size: 50px 50px;
            animation: particleMove 20s linear infinite;
            pointer-events: none;
            z-index: 0;
        }
        
        @keyframes particleMove {
            0% { transform: translate(0, 0); }
            100% { transform: translate(50px, 50px); }
        }
        .register-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 25px;
            box-shadow: 0 25px 70px rgba(0, 0, 0, 0.3), 0 0 0 1px rgba(255, 255, 255, 0.3);
            padding: 50px;
            max-width: 950px;
            width: 95%;
            animation: slideUp 0.7s ease-out, floating 3s ease-in-out infinite;
            position: relative;
            z-index: 1;
        }
        
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        @keyframes floating {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }
        
        @media (max-width: 768px) {
            .register-card {
                max-width: 500px;
                padding: 30px;
            }
        }
        .logo {
            text-align: center;
            margin-bottom: 30px;
        }
        .logo h1 {
            color: #667eea;
            font-size: 32px;
            font-weight: bold;
            margin: 0;
        }
        .logo p {
            color: #666;
            font-size: 14px;
            margin-top: 5px;
        }
        .form-control {
            border-radius: 10px;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            font-size: 15px;
        }
        .form-control:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 0.2rem rgba(102, 126, 234, 0.25);
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 10px;
            padding: 12px;
            font-size: 16px;
            font-weight: 600;
            width: 100%;
            margin-top: 20px;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }
        #otp-section {
            margin-top: 20px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 10px;
        }
        .otp-input {
            text-align: center;
            font-size: 24px;
            letter-spacing: 10px;
            font-weight: bold;
        }
        .links {
            text-align: center;
            margin-top: 20px;
        }
        .links a {
            color: #667eea;
            text-decoration: none;
            font-weight: 500;
        }
        .links a:hover {
            text-decoration: underline;
        }
        .success-message {
            color: #10b981;
            font-weight: 600;
        }
        .error-message {
            color: #ef4444;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="register-card">
        <div class="logo">
            <h1><i class="bi bi-person-plus-fill"></i> Nexus Event</h1>
            <p>Create Account - Quick & Easy</p>
        </div>

        <!-- Registration Form -->
        <div id="registration-section">
            <form id="registration-form">
                <div class="mb-3">
                    <label for="full_name" class="form-label"><i class="bi bi-person"></i> Full Name</label>
                    <input type="text" class="form-control" id="full_name" name="full_name" 
                           placeholder="Enter your full name" required>
                </div>
                
                <div class="mb-3">
                    <label for="phone" class="form-label"><i class="bi bi-phone"></i> Mobile Number</label>
                    <input type="text" class="form-control" id="phone" name="phone" 
                           placeholder="Enter 10-digit mobile number" 
                           maxlength="10" pattern="[0-9]{10}" required>
                    <small class="text-muted">Your mobile number for account access</small>
                </div>

                <div class="mb-3">
                    <label for="email" class="form-label"><i class="bi bi-envelope"></i> Email (Optional)</label>
                    <input type="email" class="form-control" id="email" name="email" 
                           placeholder="Enter email address (optional)">
                </div>

                <button type="submit" class="btn btn-primary" id="register-btn">
                    <i class="bi bi-person-plus"></i> Create Account
                </button>
            </form>
        </div>

        <!-- Success Section (Hidden Initially) -->
        <div id="success-section" style="display: none;">
            <div class="text-center">
                <i class="bi bi-check-circle-fill" style="font-size: 60px; color: #10b981;"></i>
                <h4 class="mt-3 text-success">Account Created Successfully!</h4>
                <p class="text-muted">Redirecting to dashboard...</p>
            </div>
        </div>

        <!-- Message Display -->
        <div id="message" class="mt-3 text-center"></div>

        <!-- Links -->
        <div class="links">
            <p>Already have an account? <a href="/mobile-login">Login with mobile</a></p>
            <p><a href="/register"><i class="bi bi-arrow-left"></i> Email Registration</a></p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const registrationSection = document.getElementById('registration-section');
        const successSection = document.getElementById('success-section');
        const registrationForm = document.getElementById('registration-form');
        const registerBtn = document.getElementById('register-btn');
        const messageDiv = document.getElementById('message');

        // Handle direct registration (no OTP)
        registrationForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const formData = new FormData(registrationForm);
            const phone = formData.get('phone');
            const fullName = formData.get('full_name');

            if (phone.length !== 10 || !/^\d+$/.test(phone)) {
                showMessage('Please enter a valid 10-digit mobile number', 'error');
                return;
            }

            if (!fullName || fullName.trim().length < 2) {
                showMessage('Please enter your full name', 'error');
                return;
            }

            registerBtn.disabled = true;
            registerBtn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> Creating Account...';

            try {
                const response = await fetch('/mobile-register', {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();

                if (data.success) {
                    // Show success section
                    registrationSection.style.display = 'none';
                    successSection.style.display = 'block';
                    
                    // Redirect after a short delay
                    setTimeout(() => {
                        window.location.href = data.redirect;
                    }, 2000);
                } else {
                    showMessage(data.message, 'error');
                    registerBtn.disabled = false;
                    registerBtn.innerHTML = '<i class="bi bi-person-plus"></i> Create Account';
                }
            } catch (error) {
                showMessage('Error during registration. Please try again.', 'error');
                registerBtn.disabled = false;
                registerBtn.innerHTML = '<i class="bi bi-person-plus"></i> Create Account';
            }
        });

        // Show message
        function showMessage(text, type) {
            messageDiv.innerHTML = `<div class="${type === 'success' ? 'success-message' : 'error-message'}">
                ${type === 'success' ? '<i class="bi bi-check-circle-fill"></i>' : '<i class="bi bi-exclamation-circle-fill"></i>'}
                ${text}
            </div>`;
        }

        // Input formatting - phone numbers only
        document.getElementById('phone').addEventListener('input', (e) => {
            e.target.value = e.target.value.replace(/\D/g, '');
        });
    </script>
</body>
</html>
