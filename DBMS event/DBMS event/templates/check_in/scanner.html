<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Code Check-in Scanner - Nexus Event</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .scanner-container {
            max-width: 800px;
            margin: 0 auto;
        }
        .scanner-card {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        #video {
            width: 100%;
            max-width: 500px;
            border-radius: 15px;
            border: 3px solid #667eea;
        }
        #canvas {
            display: none;
        }
        .result-box {
            margin-top: 20px;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
        }
        .result-box.success {
            background: #d4edda;
            border: 2px solid #28a745;
            color: #155724;
        }
        .result-box.error {
            background: #f8d7da;
            border: 2px solid #dc3545;
            color: #721c24;
        }
        .status-badge {
            font-size: 18px;
            padding: 10px 20px;
            border-radius: 10px;
            font-weight: bold;
        }
        .btn-scan {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            font-weight: 600;
            border-radius: 10px;
            color: white;
            margin-top: 15px;
        }
        .btn-scan:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.5);
        }
    </style>
</head>
<body>
    <div class="scanner-container">
        <div class="scanner-card">
            <h1 class="text-center mb-4">
                <i class="bi bi-qr-code-scan"></i> QR Code Check-in
            </h1>
            
            <div class="text-center">
                <video id="video" autoplay playsinline></video>
                <canvas id="canvas"></canvas>
                
                <div>
                    <button class="btn btn-scan" id="startButton" onclick="startScanner()">
                        <i class="bi bi-camera"></i> Start Scanner
                    </button>
                    <button class="btn btn-danger" id="stopButton" onclick="stopScanner()" style="display:none; padding: 15px 30px; font-size: 18px; border-radius: 10px;">
                        <i class="bi bi-stop-circle"></i> Stop Scanner
                    </button>
                </div>
                
                <div id="result" class="result-box" style="display:none;"></div>
            </div>
            
            <div class="mt-4 text-center">
                <a href="/dashboard" class="btn btn-outline-secondary">
                    <i class="bi bi-arrow-left"></i> Back to Dashboard
                </a>
            </div>
        </div>
    </div>

    <script>
        let video = document.getElementById('video');
        let canvas = document.getElementById('canvas');
        let ctx = canvas.getContext('2d');
        let scanning = false;
        let stream = null;

        async function startScanner() {
            try {
                // Request camera permission
                stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: 'environment' } 
                });
                
                video.srcObject = stream;
                video.setAttribute('playsinline', true);
                video.play();
                
                scanning = true;
                document.getElementById('startButton').style.display = 'none';
                document.getElementById('stopButton').style.display = 'inline-block';
                document.getElementById('result').style.display = 'none';
                
                requestAnimationFrame(tick);
                
            } catch (err) {
                alert('❌ Camera access denied. Please enable camera permission.');
                console.error(err);
            }
        }

        function stopScanner() {
            scanning = false;
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
            }
            document.getElementById('startButton').style.display = 'inline-block';
            document.getElementById('stopButton').style.display = 'none';
        }

        function tick() {
            if (!scanning) return;
            
            if (video.readyState === video.HAVE_ENOUGH_DATA) {
                canvas.height = video.videoHeight;
                canvas.width = video.videoWidth;
                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                
                let imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                let code = jsQR(imageData.data, imageData.width, imageData.height, {
                    inversionAttempts: 'dontInvert'
                });
                
                if (code) {
                    // QR code detected!
                    handleQRCode(code.data);
                    return;
                }
            }
            
            requestAnimationFrame(tick);
        }

        async function handleQRCode(qrData) {
            stopScanner();
            
            // Show loading
            const resultDiv = document.getElementById('result');
            resultDiv.style.display = 'block';
            resultDiv.className = 'result-box';
            resultDiv.innerHTML = '<div class="spinner-border" role="status"></div><p class="mt-2">Verifying...</p>';
            
            try {
                const response = await fetch('/check-in', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ qr_data: qrData })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    // Success!
                    resultDiv.className = 'result-box success';
                    resultDiv.innerHTML = `
                        <h2><i class="bi bi-check-circle-fill text-success"></i></h2>
                        <h3>${data.message}</h3>
                        <p class="mb-0"><strong>Guest:</strong> ${data.guest_name}</p>
                        <p class="mb-0"><strong>Event:</strong> ${data.event_name}</p>
                        <p class="mb-0"><strong>Time:</strong> ${data.check_in_time}</p>
                        <button class="btn btn-success mt-3" onclick="startScanner()">
                            <i class="bi bi-qr-code-scan"></i> Scan Next
                        </button>
                    `;
                    
                    // Play success sound
                    playSound('success');
                    
                } else {
                    // Error
                    resultDiv.className = 'result-box error';
                    resultDiv.innerHTML = `
                        <h2><i class="bi bi-x-circle-fill text-danger"></i></h2>
                        <h3>${data.message}</h3>
                        <button class="btn btn-primary mt-3" onclick="startScanner()">
                            <i class="bi bi-arrow-clockwise"></i> Try Again
                        </button>
                    `;
                    
                    // Play error sound
                    playSound('error');
                }
                
            } catch (error) {
                resultDiv.className = 'result-box error';
                resultDiv.innerHTML = `
                    <h2><i class="bi bi-exclamation-triangle-fill text-warning"></i></h2>
                    <h3>Error processing QR code</h3>
                    <p>${error.message}</p>
                    <button class="btn btn-primary mt-3" onclick="startScanner()">
                        <i class="bi bi-arrow-clockwise"></i> Try Again
                    </button>
                `;
            }
        }

        function playSound(type) {
            // Create audio context for beep sound
            const audioContext = new (window.AudioContext || window.webkitAudioContext)();
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();
            
            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);
            
            if (type === 'success') {
                oscillator.frequency.value = 800;
                gainNode.gain.value = 0.3;
                oscillator.start();
                oscillator.stop(audioContext.currentTime + 0.1);
            } else {
                oscillator.frequency.value = 400;
                gainNode.gain.value = 0.3;
                oscillator.start();
                oscillator.stop(audioContext.currentTime + 0.2);
            }
        }
    </script>
</body>
</html>
